<div class="container">
  <h1 class="mb-4">{{ parameterLabel }}</h1>

  <div class="row mb-3">
    <div class="col-auto">
      <select [(ngModel)]="selectedPeriod" (change)="onPeriodChange()" class="form-select">
        <option value="day">Dan</option>
        <option value="week">Teden</option>
        <option value="month">Mesec</option>
        <option value="6months">6 mesecev</option>
        <option value="year">Leto</option>
        <option value="custom">Poljubno</option>
      </select>
    </div>

    <div class="col-auto" *ngIf="selectedPeriod === 'day'">
      <input type="date" class="form-control" [(ngModel)]="selectedDate" max="{{ today }}" (change)="onDateChange(selectedDate)" />
      <button class="btn btn-sm btn-outline-secondary mt-1" (click)="setToday()">Danes</button>
    </div>

    <div class="col-auto" *ngIf="selectedPeriod === 'custom'">
      <input type="date" class="form-control mb-1" [(ngModel)]="customStartDate" max="{{ today }}" />
      <input type="date" class="form-control mb-1" [(ngModel)]="customEndDate" max="{{ today }}" />
      <button class="btn btn-sm btn-primary" (click)="loadCustomRange()">Naloži</button>
    </div>
  </div>

  <div class="mb-2">
    <span class="me-3">Min: {{ paramMin !== null ? paramMin.toFixed(1) + ' ' + parameterUnit : '–' }}</span>
    <span class="me-3">Max: {{ paramMax !== null ? paramMax.toFixed(1) + ' ' + parameterUnit : '–' }}</span>
    <span class="me-3">Avg: {{ paramAvg !== null ? paramAvg.toFixed(1) + ' ' + parameterUnit : '–' }}</span>
  </div>

  <div style="height: 400px;">
    <canvas baseChart
            [data]="lineChartData"
            [options]="lineChartOptions"
            type="line"
            class="w-100">
    </canvas>
  </div>
</div>
